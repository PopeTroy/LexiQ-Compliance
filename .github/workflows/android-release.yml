name: Android Only APK Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Enables manual triggering via the Actions UI tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Compile Rust NDK Binaries
        run: |
          # Compiles from root where Cargo.toml resides (clean root setup)
          cargo ndk -t arm64-v8a -t armeabi-v7a build --release
          
          # Move compiled .so libraries into Android's native dependencies folder
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          cp target/aarch64-linux-android/release/librust_engine.so android/app/src/main/jniLibs/arm64-v8a/
          cp target/armv7-linux-android/release/librust_engine.so android/app/src/main/jniLibs/armeabi-v7a/

      - name: Build Android APK
        run: |
          flutter build apk --release

      # 📦 Always upload APK to Actions Run Summary for instant manual downloading
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lexiq-compliance-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      # 🚀 Deploy to official Github Releases ONLY if triggered by a tag
      - name: Upload APK to Github Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
