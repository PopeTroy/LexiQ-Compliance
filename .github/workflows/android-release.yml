name: Android Only APK Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Enables manual triggering via the Actions UI tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Compile Rust NDK Binaries
        run: |
          # 1. Compile the NDK libraries from the directory containing Cargo.toml
          RUST_DIR=$(find . -name "Cargo.toml" -exec dirname {} \; | head -n 1)
          echo "Found Rust project in: $RUST_DIR"
          cd "$RUST_DIR"
          cargo ndk -t arm64-v8a -t armeabi-v7a build --release
          cd - # Return to root
          
          # 2. Dynamically locate the Android native structure
          ANDROID_DIR=$(find . -path "*/android/app/src/main" -type d | head -n 1)
          if [ -z "$ANDROID_DIR" ]; then
            echo "ERROR: Could not find Android native folder layout (android/app/src/main)!"
            exit 1
          fi
          echo "Linking binaries to Android target directory: $ANDROID_DIR"
          
          # 3. Create JNI directories and copy the built libraries safely
          mkdir -p "$ANDROID_DIR/jniLibs/arm64-v8a"
          mkdir -p "$ANDROID_DIR/jniLibs/armeabi-v7a"
          
          cp "$RUST_DIR/target/aarch64-linux-android/release/liblexiq_compliance.so" "$ANDROID_DIR/jniLibs/arm64-v8a/"
          cp "$RUST_DIR/target/armv7-linux-androideabi/release/liblexiq_compliance.so" "$ANDROID_DIR/jniLibs/armeabi-v7a/"

      - name: Build Android APK
        run: |
          # 1. Dynamically locate the Flutter project containing pubspec.yaml
          FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$FLUTTER_DIR" ]; then
            echo "ERROR: No pubspec.yaml found in this repository. Please run 'flutter create .' locally and push your Flutter project."
            exit 1
          fi
          echo "Executing Flutter build inside: $FLUTTER_DIR"
          
          # 2. Move to the directory and run the build
          cd "$FLUTTER_DIR"
          flutter build apk --release

      # 📦 Always upload the compiled APK as a manual Actions run artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lexiq-compliance-android-apk
          # Finds and uploads whatever APK was successfully generated
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
          if-no-files-found: error
          retention-days: 14

      # 🚀 Deploy to official Github Releases ONLY if triggered by a tag
      - name: Upload APK to Github Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: "**/build/app/outputs/flutter-apk/app-release.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
