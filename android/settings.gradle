pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = new File(settingsDir, "local.properties")
        if (propertiesFile.exists()) {
            propertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        }
        def sdkPath = properties.getProperty("flutter.sdk")
        assert sdkPath != null, "flutter.sdk not set in local.properties"
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // ◄— Bumped AGP version to 8.6.0 to satisfy Flutter requirements
    id "com.android.application" version "8.6.0" apply false
    // ◄— Bumped Kotlin version to align with modern Gradle standards
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
}

include ":app"
